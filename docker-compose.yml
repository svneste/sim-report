services:
  postgres:
    image: postgres:16-alpine
    container_name: amocrm_sim_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amocrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amocrm}
      POSTGRES_DB: ${POSTGRES_DB:-amocrm_sim}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amocrm} -d ${POSTGRES_DB:-amocrm_sim}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: amocrm_sim_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pg_data:
