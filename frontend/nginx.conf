server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Bitrix24 при первом открытии handler URL загружает iframe POST-запросом
  # (form с AUTH_ID, REFRESH_ID, DOMAIN и т.п.). nginx по умолчанию отдаёт
  # на POST к статике 405 — конвертируем в 200 и отдаём index.html.
  error_page 405 =200 $uri;

  # Разрешаем встраивать фронт в iframe только из конкретного портала Bitrix24.
  # X-Frame-Options оставлять нельзя — он несовместим с frame-ancestors и режет
  # современные браузеры. Если порталов несколько — добавь сюда через пробел.
  add_header Content-Security-Policy "frame-ancestors 'self' https://melabs.bitrix24.ru" always;

  # SPA fallback — все «маршруты» отдаём в index.html, React сам разрулит.
  location / {
    try_files $uri /index.html;
  }

  # Кэшируем хешированные ассеты Vite надолго
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Content-Security-Policy "frame-ancestors 'self' https://melabs.bitrix24.ru" always;
  }
}
