server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — все «маршруты» отдаём в index.html, React сам разрулит.
  location / {
    try_files $uri /index.html;
  }

  # Кэшируем хешированные ассеты Vite надолго
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
